<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- HTML Link -->
    <link rel="preconnect" href="https://googleapis.com" />
    <link rel="preconnect" href="https://gstatic.com" crossorigin />
    <link
      href="https://googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5"></script>
    <link rel="stylesheet" href="stylesheet.css" />
    <script src="javascript.js" defer></script>
  </head>
  <body>
    <h3>Etch-a-Sketch</h3>

    <div class="side-Content-Container">
      <div class="menu">
        <button class="color" style="position: relative">
          Color mode:
          <div class="circle-Color"></div>
        </button>
        <div id="pickerContainer"></div>
        <button class="erase">Erase</button>
        <button class="toggle-Grid-Line">Toggle Grid Lines</button>
        <button class="clear">Clear</button>
      </div>
      <div class="slider-container">
        <div class="slider-value">16 x 16</div>
        <input type="range" class="custom-slider" min="1" max="64" value="16" />
      </div>
    </div>

    <div id="grid-container"></div>
  </body>
</html>
